<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Formulário de Cadastro</title>
    <style>
        body { font-family: sans-serif; margin: 20px; line-height: 1.6; }
        form { max-width: 500px; background: #f4f4f4; padding: 20px; border-radius: 8px; }
        div { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="email"], input[type="number"], input[type="date"], select {
            width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        button { background-color: #28a745; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

    <h2>Cadastro de Dados Pessoais</h2>

    <form action="#" method="post">
        <div>
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
        </div>

        <div>
            <label>Sexo:</label>
            <input type="radio" id="masc" name="sexo" value="masculino">
            <label style="display:inline" for="masc">Masculino</label>
            <input type="radio" id="fem" name="sexo" value="feminino">
            <label style="display:inline" for="fem">Feminino</label>
        </div>

        <div>
            <label for="estado_civil">Estado Civil:</label>
            <select id="estado_civil" name="estado_civil">
                <option value="">Selecione...</option>
                <option value="solteiro">Solteiro(a)</option>
                <option value="casado">Casado(a)</option>
                <option value="divorciado">Divorciado(a)</option>
                <option value="viuvo">Viúvo(a)</option>
            </select>
        </div>

        <div>
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="seuemail@exemplo.com" required>
        </div>

        <div style="display: flex; gap: 10px;">
            <div style="flex: 3;">
                <label for="endereco">Endereço:</label>
                <input type="text" id="endereco" name="endereco" placeholder="Rua, Av...">
            </div>
            <div style="flex: 1;">
                <label for="numero">Número:</label>
                <input type="number" id="numero" name="numero">
            </div>
        </div>

        <div>
            <label for="data_nasc">Data de Nascimento:</label>
            <input type="date" id="data_nasc" name="data_nasc">
        </div>

        <button type="submit">Enviar Dados</button>
    </form>

</body>
</html>
